  <style>
    .schedule-header {
      padding: 40px 0 20px;
    }

    .schedule-header h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .schedule-header p {
      color: var(--text-secondary);
      font-size: 15px;
    }

    .schedule-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .schedule-search {
      flex: 1;
      min-width: 200px;
      max-width: 360px;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
      transition: border-color var(--transition);
    }

    .schedule-search:focus {
      border-color: var(--border-accent);
    }

    .schedule-search::placeholder {
      color: var(--text-muted);
    }

    .date-group {
      margin-bottom: 36px;
    }

    .date-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 10px 0;
      margin-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .schedule-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .schedule-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      border-radius: var(--radius-md);
      background: var(--bg-card);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all var(--transition);
      text-decoration: none;
      color: inherit;
    }

    .schedule-item:hover {
      background: var(--bg-card-hover);
      border-color: rgba(255, 255, 255, 0.1);
      transform: translateX(3px);
    }

    .schedule-item.live-item {
      border-color: rgba(255, 71, 87, 0.2);
    }

    .schedule-time {
      font-size: 14px;
      font-weight: 700;
      min-width: 64px;
      text-align: center;
    }

    .schedule-time.live-time {
      color: var(--red);
    }

    .schedule-sep {
      width: 1px;
      height: 40px;
      background: var(--border);
      flex-shrink: 0;
    }

    .schedule-teams {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .schedule-team-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }

    .schedule-team-logo {
      width: 22px;
      height: 22px;
      object-fit: contain;
    }

    .schedule-team-name {
      font-weight: 600;
    }

    .schedule-score {
      font-size: 18px;
      font-weight: 800;
      min-width: 48px;
      text-align: center;
      flex-shrink: 0;
    }

    .schedule-badge {
      flex-shrink: 0;
    }

    .schedule-competition {
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    [dir="rtl"] .schedule-item:hover { transform: translateX(-3px); }
    [dir="rtl"] .date-label { text-align: right; }
    [dir="rtl"] .schedule-header { text-align: right; }
    [dir="rtl"] .schedule-teams { text-align: right; }
  </style>
</head>
